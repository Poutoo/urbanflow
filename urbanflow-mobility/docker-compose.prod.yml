services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      # Prime sur toute valeur REDIS_URL de .env.production — pas besoin de l'y définir.
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - '3001'
    healthcheck:
      # /api/auth/me sans token répond 401 avant même d'atteindre Prisma (le guard JWT
      # rejette la requête faute de Bearer token) : il ne prouve donc PAS que la connexion
      # DB est vivante, seulement que le serveur HTTP répond. Testé en local avec Postgres
      # coupé : /api/auth/me restait "healthy" sans interruption. D'où /api/health, qui
      # exécute un SELECT 1 réel et échoue (500) si Prisma ne répond plus.
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('http').get('http://localhost:3001/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    expose:
      - '6379'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy

volumes:
  redis_data:
  caddy_data:
  caddy_config:
