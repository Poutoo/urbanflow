name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://urbanflow:urbanflow_test@localhost:5432/urbanflow_test
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: test-jwt-secret-minimum-32-characters-long
  JWT_REFRESH_SECRET: test-jwt-refresh-secret-minimum-32-chars
  JWT_ACCESS_EXPIRY: 15m
  JWT_REFRESH_EXPIRY: 7d
  NODE_ENV: test

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: urbanflow_test
          POSTGRES_USER: urbanflow
          POSTGRES_PASSWORD: urbanflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend prisma generate

      - name: Run database migrations
        run: pnpm --filter backend prisma migrate deploy

      - name: Lint
        run: pnpm lint

      - name: Test (backend)
        run: pnpm --filter backend test:coverage

      - name: Test (frontend)
        run: pnpm --filter frontend test:coverage

      - name: Build
        run: pnpm build
