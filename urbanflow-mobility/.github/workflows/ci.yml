name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint · Types · Tests · Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: urbanflow_test
          POSTGRES_USER: urbanflow
          POSTGRES_PASSWORD: urbanflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://urbanflow:urbanflow_test@localhost:5432/urbanflow_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-secret-not-used-in-prod-32chars
      JWT_REFRESH_SECRET: ci-refresh-secret-not-used-32chars
      NEXTAUTH_SECRET: ci-nextauth-secret
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter backend prisma generate

      - name: Prisma migrate (test DB)
        run: pnpm --filter backend prisma migrate deploy

      - name: Lint
        run: pnpm turbo lint

      - name: Tests
        run: pnpm turbo test

      - name: Build
        run: pnpm turbo build
