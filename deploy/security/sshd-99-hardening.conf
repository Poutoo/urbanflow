# deploy/security/sshd-99-hardening.conf
# À copier vers /etc/ssh/sshd_config.d/99-hardening.conf sur le VPS (Ubuntu 20.04+ inclut
# par défaut "Include /etc/ssh/sshd_config.d/*.conf" dans /etc/ssh/sshd_config — vérifier
# cette ligne avant de copier ce fichier, sinon il ne sera jamais chargé).
#
# Avantage du drop-in plutôt que d'éditer /etc/ssh/sshd_config directement : rollback
# instantané en cas de problème (il suffit de supprimer ce fichier et de relancer sshd).

PubkeyAuthentication yes
PasswordAuthentication no
# prohibit-password (et non "no") : root ne peut jamais se connecter par mot de passe,
# mais reste joignable par clé — conservé comme accès de secours si le compte urbanflow
# est un jour bloqué. Choix confirmé le 2026-07-21 (valeur déjà active en prod, retenue
# volontairement plutôt que "no").
PermitRootLogin prohibit-password
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no
